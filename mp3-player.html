<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wavely</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--acc:#f5a623;--bg:#121212;--card:#1a1a1a;--card2:#282828;--card3:#333;--txt:#fff;--txt2:#b3b3b3;--txt3:#6a6a6a}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* ── SCREENS ── */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;padding-bottom:4px}
.screen.active{display:flex}
.screen::-webkit-scrollbar{display:none}

/* ── HOME ── */
#scr-home{padding-bottom:0}
.home-header{padding:52px 16px 16px;display:flex;align-items:center;justify-content:space-between}
.home-header h1{font-size:22px;font-weight:800}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}

.chips{display:flex;gap:8px;padding:0 16px 20px;overflow-x:auto;flex-shrink:0}
.chips::-webkit-scrollbar{display:none}
.chip{background:var(--card2);border:none;color:var(--txt);font-size:13px;font-weight:600;padding:8px 16px;border-radius:50px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.active{background:var(--acc);color:#000}
.chip:active{opacity:.75}

.section-title{font-size:18px;font-weight:800;padding:0 16px 14px}

/* RECENT GRID */
.recent-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 24px}
.recent-card{background:var(--card2);border-radius:6px;display:flex;align-items:center;gap:12px;overflow:hidden;cursor:pointer;transition:background .15s;min-height:56px}
.recent-card:active{background:var(--card3)}
.recent-card.playing{background:rgba(245,166,35,.18)}
.recent-thumb{width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--card3)}
.recent-name{font-size:13px;font-weight:700;line-height:1.3;padding-right:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.recent-card.playing .recent-name{color:var(--acc)}

/* EMPTY STATE HOME */
.empty-home{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 32px;text-align:center;color:var(--txt2)}
.empty-home .big{font-size:56px}
.empty-home h2{font-size:20px;font-weight:800;color:var(--txt)}
.empty-home p{font-size:14px;line-height:1.5}

/* ── LIBRARY ── */
.lib-header{padding:52px 16px 16px;display:flex;align-items:center;justify-content:space-between}
.lib-header h1{font-size:22px;font-weight:800}
#btn-add{background:none;border:none;color:var(--txt);cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:50%;min-width:40px;min-height:40px}
#btn-add:active{background:var(--card2)}
#file-input{display:none}

.lib-list{display:flex;flex-direction:column;gap:2px;padding:0 8px}
.lib-track{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .12s}
.lib-track:active{background:var(--card2)}
.lib-track.playing .lib-name{color:var(--acc)}
.lib-thumb{width:52px;height:52px;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative}
.lib-info{flex:1;min-width:0}
.lib-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.lib-sub{font-size:12px;color:var(--txt2)}
.lib-del{background:none;border:none;color:var(--txt3);font-size:20px;cursor:pointer;padding:8px;border-radius:50%;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lib-del:active{color:#e24b4a;background:rgba(226,75,74,.1)}

/* BARS */
.bars{display:none;gap:2px;align-items:flex-end;height:14px;position:absolute;bottom:4px;right:4px}
.lib-track.playing .lib-thumb .bars{display:flex}
.recent-card.playing .bars-rc{display:flex!important}
.bars-rc{display:none;gap:2px;align-items:flex-end;height:12px;position:absolute;bottom:3px;right:3px}
.b{width:3px;background:var(--acc);border-radius:1px;animation:bop .7s ease-in-out infinite}
.b:nth-child(2){animation-delay:.12s}.b:nth-child(3){animation-delay:.25s}
@keyframes bop{0%,100%{height:2px}50%{height:11px}}

/* ── MINI PLAYER ── */
#miniplayer{display:none;flex-shrink:0;margin:8px 8px 0;border-radius:12px;background:var(--card2);overflow:hidden;cursor:pointer}
#miniplayer.visible{display:block}
.mp-progress{height:2px;background:var(--card3)}
.mp-bar{height:100%;background:var(--acc);width:0%;transition:width .1s linear}
.mp-body{display:flex;align-items:center;gap:10px;padding:10px 14px}
.mp-thumb{width:42px;height:42px;border-radius:6px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-time{font-size:11px;color:var(--txt2);margin-top:2px}
.mp-btns{display:flex;align-items:center;gap:2px;flex-shrink:0}
.mpb{background:none;border:none;color:var(--txt);cursor:pointer;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.mpb:active{background:rgba(255,255,255,.1)}
#mpb-play{background:var(--acc)!important;color:#000!important;border-radius:50%;width:40px;height:40px;min-width:40px;min-height:40px}
#mpb-play:active{opacity:.8!important}

/* ── BOTTOM NAV ── */
#bottom-nav{flex-shrink:0;display:flex;background:#000;padding:10px 0 20px;border-top:1px solid #2a2a2a}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--txt3);font-size:10px;font-weight:600;letter-spacing:.3px;min-height:44px;transition:color .15s}
.nav-item.active{color:var(--txt)}
.nav-item:active{opacity:.7}
.nav-icon{font-size:22px;line-height:1}

/* ── NOW PLAYING OVERLAY ── */
#nowplaying{position:absolute;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#nowplaying.open{display:flex;transform:translateY(0)}
.np-header{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.np-down{background:none;border:none;color:var(--txt2);cursor:pointer;padding:8px;font-size:22px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.np-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt2)}
.np-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:0 32px 20px;overflow:hidden}
.np-cover{width:min(280px,80vw);height:min(280px,80vw);border-radius:16px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:min(100px,25vw);box-shadow:0 24px 64px rgba(0,0,0,.7);flex-shrink:0}
.np-cover.playing{animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
.np-info{width:100%;text-align:center}
.np-title{font-size:22px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.np-sub{font-size:14px;color:var(--txt2)}
.np-prog-wrap{width:100%}
.np-prog{width:100%;height:4px;background:var(--card3);border-radius:2px;cursor:pointer;padding:10px 0;margin:-10px 0}
.np-prog-track{height:4px;background:var(--card3);border-radius:2px;pointer-events:none}
.np-prog-fill{height:100%;background:var(--acc);border-radius:2px;width:0%;transition:width .1s linear}
.np-times{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--txt3)}
.np-controls{display:flex;align-items:center;justify-content:space-between;width:100%}
.npc{background:none;border:none;color:var(--txt2);cursor:pointer;padding:12px;min-width:56px;min-height:56px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.npc:active{background:var(--card2)}
.npc.active{color:var(--acc)}
#npc-play{background:var(--txt)!important;color:var(--bg)!important;width:64px!important;height:64px!important;min-width:64px;border-radius:50%}
#npc-play:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="scr-home">
    <div class="home-header">
      <h1 id="greeting">Bonjour 👋</h1>
      <div class="avatar">🎧</div>
    </div>
    <div class="chips">
      <button class="chip active">Tout</button>
      <button class="chip">Musique</button>
      <button class="chip">Récents</button>
    </div>
    <div id="home-content"></div>
  </div>

  <!-- LIBRARY -->
  <div class="screen" id="scr-library">
    <div class="lib-header">
      <h1>Bibliothèque</h1>
      <button id="btn-add" onclick="document.getElementById('file-input').click()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>
    <input type="file" id="file-input" multiple accept="audio/*,.mp3,.wav,.ogg,.flac,.m4a,.aac">
    <div class="lib-list" id="lib-list"></div>
    <div id="lib-empty" style="display:none">
      <div class="empty-home" style="padding:40px 32px">
        <div class="big">🎵</div>
        <h2>Bibliothèque vide</h2>
        <p>Appuie sur + pour importer tes MP3</p>
      </div>
    </div>
  </div>

  <!-- MINI PLAYER -->
  <div id="miniplayer" onclick="openNP()">
    <div class="mp-progress"><div class="mp-bar" id="mp-bar"></div></div>
    <div class="mp-body">
      <div class="mp-thumb" id="mp-thumb">🎵</div>
      <div class="mp-info">
        <div class="mp-title" id="mp-title">—</div>
        <div class="mp-time"><span id="mp-cur">0:00</span> · <span id="mp-dur">0:00</span></div>
      </div>
      <div class="mp-btns" onclick="e=>e.stopPropagation()">
        <button class="mpb" id="mpb-prev" onclick="event.stopPropagation();prevTrack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="mpb" id="mpb-play" onclick="event.stopPropagation();togglePlay()">
          <svg id="mp-ic-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="mp-ic-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
        </button>
        <button class="mpb" id="mpb-next" onclick="event.stopPropagation();nextTrack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="goTo('home')">
      <span class="nav-icon">🏠</span>Accueil
    </button>
    <button class="nav-item" id="nav-search" onclick="goTo('library')">
      <span class="nav-icon">🔍</span>Rechercher
    </button>
    <button class="nav-item" id="nav-library" onclick="goTo('library')">
      <span class="nav-icon">📚</span>Bibliothèque
    </button>
    <button class="nav-item" id="nav-add" onclick="document.getElementById('file-input').click()">
      <span class="nav-icon">➕</span>Ajouter
    </button>
  </div>

  <!-- NOW PLAYING OVERLAY -->
  <div id="nowplaying">
    <div class="np-header">
      <button class="np-down" onclick="closeNP()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </button>
      <span class="np-label">En écoute</span>
      <div style="width:44px"></div>
    </div>
    <div class="np-body">
      <div class="np-cover" id="np-cover">🎵</div>
      <div class="np-info">
        <div class="np-title" id="np-title">—</div>
        <div class="np-sub" id="np-sub">Wavely</div>
      </div>
      <div class="np-prog-wrap">
        <div class="np-prog" id="np-prog">
          <div class="np-prog-track"><div class="np-prog-fill" id="np-fill"></div></div>
        </div>
        <div class="np-times"><span id="np-cur">0:00</span><span id="np-dur">0:00</span></div>
      </div>
      <div class="np-controls">
        <button class="npc" id="npc-shuffle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20l16-16M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="npc" onclick="prevTrack()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="npc" id="npc-play" onclick="togglePlay()">
          <svg id="np-ic-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="np-ic-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
        </button>
        <button class="npc" onclick="nextTrack()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="npc" id="npc-repeat">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>
<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
const playlist = [];
let cur = -1, shuffle = false, repeat = false, db = null;

const emojis = ['🎸','🎹','🎺','🎻','🥁','🪗','🎷','🎵','🎶','🎤','🪘','🎧'];
const rE = () => emojis[Math.floor(Math.random()*emojis.length)];
const fmt = s => { if(!s||isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; };

// greeting
const h=new Date().getHours();
document.getElementById('greeting').textContent = h<12?'Bonjour 👋':h<18?'Bon après-midi ☀️':'Bonsoir 🌙';

// ── DB ──────────────────────────────────────────────────────
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open('wavely3',1); r.onupgradeneeded=e=>{ if(!e.target.result.objectStoreNames.contains('t')) e.target.result.createObjectStore('t',{keyPath:'id',autoIncrement:true}); }; r.onsuccess=e=>res(e.target.result); r.onerror=()=>rej(); }); }
const dbPut=t=>db&&db.transaction('t','readwrite').objectStore('t').put(t);
const dbDel=id=>db&&id!=null&&db.transaction('t','readwrite').objectStore('t').delete(id);
const dbAll=()=>new Promise(res=>{ if(!db)return res([]); const r=db.transaction('t','readonly').objectStore('t').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]); });

// ── Navigation ──────────────────────────────────────────────
function goTo(page){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('scr-'+page).classList.add('active');
  if(page==='home') document.getElementById('nav-home').classList.add('active');
  else if(page==='library') document.getElementById('nav-library').classList.add('active');
}

// ── Now Playing overlay ─────────────────────────────────────
function openNP(){
  const np=document.getElementById('nowplaying');
  np.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>np.classList.add('open')));
}
function closeNP(){
  const np=document.getElementById('nowplaying');
  np.classList.remove('open');
  setTimeout(()=>{ np.style.display='none'; }, 320);
}

// ── Render ──────────────────────────────────────────────────
function renderHome(){
  const el=document.getElementById('home-content');
  if(!playlist.length){
    el.innerHTML=`<div class="empty-home"><div class="big">🎧</div><h2>Aucune musique</h2><p>Appuie sur <b>Ajouter</b> en bas pour importer tes MP3</p></div>`;
    return;
  }
  let html=`<div class="section-title">Tes morceaux</div><div class="recent-grid">`;
  playlist.forEach((t,i)=>{
    const playing=i===cur;
    html+=`<div class="recent-card${playing?' playing':''}" onclick="play(${i})">
      <div class="recent-thumb" style="position:relative">${t.emoji}
        <div class="bars-rc"><div class="b"></div><div class="b"></div><div class="b"></div></div>
      </div>
      <span class="recent-name">${t.name}</span>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

function renderLib(){
  const el=document.getElementById('lib-list');
  const empty=document.getElementById('lib-empty');
  el.innerHTML='';
  empty.style.display=playlist.length?'none':'block';
  playlist.forEach((t,i)=>{
    const playing=i===cur;
    const div=document.createElement('div');
    div.className='lib-track'+(playing?' playing':'');
    div.innerHTML=`
      <div class="lib-thumb" style="position:relative">${t.emoji}
        <div class="bars"><div class="b"></div><div class="b"></div><div class="b"></div></div>
      </div>
      <div class="lib-info">
        <div class="lib-name">${t.name}</div>
        <div class="lib-sub">${t.dur||'...'} · ${t.size}</div>
      </div>
      <button class="lib-del" onclick="del(event,${i})">⋯</button>`;
    div.addEventListener('click', e=>{ if(!e.target.classList.contains('lib-del')) play(i); });
    el.appendChild(div);
  });
}

function render(){ renderHome(); renderLib(); }

// ── Playback ────────────────────────────────────────────────
function play(idx){
  if(idx<0||idx>=playlist.length) return;
  cur=idx;
  const t=playlist[idx];
  audio.src=t.url; audio.load();
  const p=audio.play(); if(p&&p.catch)p.catch(()=>setUI(false));
  document.getElementById('miniplayer').classList.add('visible');
  document.getElementById('mp-thumb').textContent=t.emoji;
  document.getElementById('mp-title').textContent=t.name;
  document.getElementById('np-cover').textContent=t.emoji;
  document.getElementById('np-title').textContent=t.name;
  document.getElementById('np-sub').textContent=t.size;
  render();
}
function togglePlay(){
  if(cur<0&&playlist.length>0){play(0);return;}
  if(audio.paused){const p=audio.play();if(p&&p.catch)p.catch(()=>setUI(false));}
  else audio.pause();
}
function prevTrack(){ if(audio.currentTime>3){audio.currentTime=0;}else if(cur>0)play(cur-1); }
function nextTrack(){ if(cur<playlist.length-1)play(cur+1); }
function del(e,i){
  e.stopPropagation();
  dbDel(playlist[i].id);
  playlist.splice(i,1);
  if(cur===i){audio.pause();cur=-1;document.getElementById('miniplayer').classList.remove('visible');}
  else if(cur>i)cur--;
  render();
}

// ── Audio events ────────────────────────────────────────────
function setUI(pl){
  ['mp-ic-play','np-ic-play'].forEach(id=>document.getElementById(id).style.display=pl?'none':'block');
  ['mp-ic-pause','np-ic-pause'].forEach(id=>document.getElementById(id).style.display=pl?'block':'none');
  document.getElementById('np-cover').classList.toggle('playing',pl);
  render();
}
audio.addEventListener('play',()=>setUI(true));
audio.addEventListener('pause',()=>setUI(false));
audio.addEventListener('ended',()=>{ if(repeat){audio.play();}else nextTrack(); });
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const pct=audio.currentTime/audio.duration*100;
  ['mp-bar','np-fill'].forEach(id=>document.getElementById(id).style.width=pct+'%');
  const c=fmt(audio.currentTime),d=fmt(audio.duration);
  document.getElementById('mp-cur').textContent=c;
  document.getElementById('mp-dur').textContent=d;
  document.getElementById('np-cur').textContent=c;
  document.getElementById('np-dur').textContent=d;
});

// Seek
document.getElementById('np-prog').addEventListener('click',e=>{
  if(!audio.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});

// Shuffle / Repeat
document.getElementById('npc-shuffle').addEventListener('click',function(){shuffle=!shuffle;this.classList.toggle('active',shuffle);});
document.getElementById('npc-repeat').addEventListener('click',function(){repeat=!repeat;this.classList.toggle('active',repeat);});

// ── Add files ────────────────────────────────────────────────
function addFiles(files){
  [...files].forEach(f=>{
    if(!f.type.match(/audio/i)&&!f.name.match(/\.(mp3|wav|ogg|flac|m4a|aac)$/i))return;
    const name=f.name.replace(/\.[^.]+$/,'');
    const sk=(f.size/1024).toFixed(0);
    const size=sk>1024?`${(sk/1024).toFixed(1)} MB`:`${sk} KB`;
    const track={name,size,emoji:rE(),url:null,dur:'...'};
    const idx=playlist.push(track)-1;
    render();
    const reader=new FileReader();
    reader.onload=ev=>{
      const url=ev.target.result;
      playlist[idx].url=url;
      const tmp=new Audio(url);
      tmp.addEventListener('loadedmetadata',()=>{
        playlist[idx].dur=fmt(tmp.duration);
        render();
        if(db){
          const obj={name,url,size,emoji:track.emoji,dur:playlist[idx].dur};
          if(playlist[idx].id!=null)obj.id=playlist[idx].id;
          const req=db.transaction('t','readwrite').objectStore('t').put(obj);
          req.onsuccess=ev2=>{playlist[idx].id=ev2.target.result;};
        }
      });
      if(db){
        const req=db.transaction('t','readwrite').objectStore('t').add({name,url,size,emoji:track.emoji,dur:'...'});
        req.onsuccess=ev2=>{playlist[idx].id=ev2.target.result;};
      }
      if(cur<0)play(idx);
    };
    reader.readAsDataURL(f);
  });
}
document.getElementById('file-input').addEventListener('change',e=>addFiles(e.target.files));

// ── Init ──────────────────────────────────────────────────────
openDB().then(d=>{db=d;return dbAll();}).then(saved=>{
  saved.forEach(t=>playlist.push(t));
  render();
  if(playlist.length){
    cur=0;
    const t=playlist[0];
    document.getElementById('miniplayer').classList.add('visible');
    document.getElementById('mp-thumb').textContent=t.emoji;
    document.getElementById('mp-title').textContent=t.name;
    document.getElementById('np-cover').textContent=t.emoji;
    document.getElementById('np-title').textContent=t.name;
    document.getElementById('np-sub').textContent=t.size;
  }
}).catch(()=>{});
</script>
